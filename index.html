<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo (Local)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Todo</h1>
        <p class="subtitle">Saved locally in your browser</p>
      </header>

      <section class="card">
        <form id="addForm" class="row" autocomplete="off">
          <input
            id="newTodo"
            class="input"
            type="text"
            placeholder="Add a task…"
            maxlength="200"
            required
          />
          <button class="btn primary" type="submit">Add</button>
        </form>

        <ul id="list" class="list" aria-live="polite"></ul>

        <footer class="footer between wrap">
          <div id="count" class="muted">0 items left</div>
          <div class="muted">Tap checkbox to complete</div>
        </footer>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
